<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }
    .container {
      text-align: center;
      line-height: 1.2;
    }
    #clock {
      font-size: 4em;
      font-weight: 300;
      letter-spacing: 2px;
    }
    #date {
      font-size: 1em;
      margin-top: 8px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="clock">00:00</div>
    <div id="date"></div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    let config = { 
      showSeconds: true, 
      showDate: true,
      transparentBg: true,
      theme: 'dark', 
      color: '#ffffff',
      fontSize: 48
    };

    function updateTime() {
      const now = new Date();
      let timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      if (config.showSeconds) {
        timeStr += ':' + now.getSeconds().toString().padStart(2, '0');
      }
      document.getElementById('clock').innerText = timeStr;
      
      if (config.showDate) {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date').innerText = now.toLocaleDateString(undefined, options);
        document.getElementById('date').style.display = 'block';
      } else {
        document.getElementById('date').style.display = 'none';
      }
    }

    function applyConfig(cfg) {
      if (!cfg) return;
      config = { ...config, ...cfg };
      
      const body = document.body;
      const clock = document.getElementById('clock');
      
      const isDefaultLightColor = (c) => !c || c === '#333333' || c === '#333';
      const isDefaultDarkColor = (c) => !c || c === '#ffffff' || c === '#fff';

      if (config.transparentBg) {
        body.style.background = 'transparent';
      } else {
        if (config.theme === 'light') {
          body.style.background = 'rgba(255, 255, 255, 0.9)';
        } else {
          body.style.background = 'rgba(0, 0, 0, 0.6)';
        }
      }

      if (config.theme === 'light') {
        if (isDefaultDarkColor(config.color)) { 
          body.style.color = '#333';
        } else {
          body.style.color = config.color;
        }
      } else {
        if (isDefaultLightColor(config.color)) { 
          body.style.color = '#fff';
        } else {
          body.style.color = config.color;
        }
      }

      if (config.fontSize) {
        clock.style.fontSize = `${config.fontSize}px`;
      }
      
      updateTime();
    }

    ipcRenderer.on('config-updated', (event, newConfig) => {
      applyConfig(newConfig);
    });
    
    setInterval(updateTime, 1000);
    updateTime();
    applyConfig(config);
  </script>
</body>
</html>
